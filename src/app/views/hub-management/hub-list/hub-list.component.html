<div class="">
    <app-page-title title="Hub Management" subTitle="Basic Setup"></app-page-title>
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-light border-bottom">
                    <div class="d-flex justify-content-between align-items-center col-12"
                        style="margin-top: -5px; margin-bottom: -5px;">
                        <div class="d-flex align-items-center">
                            <ng-icon name="tablerList" class="me-2 gradient-icon" size="20"></ng-icon>
                            <h4 class="card-title mb-0 text-dark">Hubs</h4>
                        </div>
                        <button type="button" class="btn submit-button" (click)="addNewHub()">
                            <ng-icon name="tablerPlus" class="me-1" size="16"></ng-icon>
                            Add Hub
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="rounded mb-2">
                        <form [formGroup]="filterForm">
                            <div class="row">
                                <div class="col-md-2">
                                    <label class="form-label fw-semibold">Code</label>
                                    <input type="text" class="form-control" formControlName="code" placeholder="All Codes" />
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label fw-semibold">Hub</label>
                                    <input type="text" class="form-control" formControlName="name" placeholder="All Hubs" />
                                </div>
                                <div class="col-md-2 d-flex align-items-end gap-2">
                                    <button type="button" class="btn submit-button flex-fill" (click)="onSearch()">
                                        <ng-icon name="tablerSearch" size="16" class="me-1"></ng-icon>
                                        Search
                                    </button>
                                    <button type="button" class="btn btn-dark" (click)="onClearFilters()">
                                        <ng-icon name="tablerX" size="16" class="me-1"></ng-icon>
                                        Clear
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                    @if (isLoading) {
                    <app-skeleton-loader variant="table" [rows]="8" [cols]="4" ariaLabel="Loading hubs table"></app-skeleton-loader>
                    } @else {
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped table-sm">
                            <thead class="table text-center">
                                <tr>
                                    <th class="fw-bold">Code</th>
                                    <th class="fw-bold">Hub</th>
                                    <th class="fw-bold">Status</th>
                                    <th class="text-center fw-bold">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="table-group-divider text-center">
                                @for (hub of hubs; track hub.id) {
                                <tr>
                                    <td>
                                        <span class="fw-medium">{{ hub.code }}</span>
                                    </td>
                                    <td>{{ hub.name }}</td>
                                    <td>
                                        <span [class]="getStatusBadgeClass(hub.isActive ?? false)">
                                            {{ getStatusText(hub.isActive ?? false) }}
                                        </span>
                                    </td>
                                    <td class="text-center">
                                        <div class="btn-group" role="group">
                                            <button type="button" class="btn btn-sm btn-outline-primary"
                                                (click)="editHub(hub.id!)" title="Edit Hub">
                                                <ng-icon name="tablerEdit" size="16"></ng-icon>
                                            </button>
                                            <button type="button" class="btn btn-sm btn-outline-danger"
                                                (click)="deleteHub(hub)" title="Delete Hub">
                                                <ng-icon name="tablerTrash" size="16"></ng-icon>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                                } @empty {
                                <tr>
                                    <td colspan="4" class="text-center py-4">
                                        <div class="text-muted">
                                            <ng-icon name="tablerInbox" size="48" class="mb-2 d-block mx-auto"></ng-icon>
                                            <p class="mb-0">No hubs found</p>
                                        </div>
                                    </td>
                                </tr>
                                }
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <app-generic-pagination [totalItems]="totalRecord" [pageSize]="PaginationInfo.RowsPerPage"
                        [currentPage]="PaginationInfo.Page" (pageChanged)="onHubPageChanged($event)">
                    </app-generic-pagination>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
