<div class="status-card mb-3">
  <div class="card status-card-modern">
    <div class="card-header status-card-header">
      <div class="header-content">
        <ng-icon name="tablerChartBar" size="18" class="header-icon"></ng-icon>
        <h3 class="card-title">Transaction Status by Channel</h3>
      </div>
      <div class="legend-container">
        <div class="legend-item">
          <span class="legend-dot incoming"></span>
          <span class="legend-label">Incoming</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot outgoing"></span>
          <span class="legend-label">Outgoing</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot pending"></span>
          <span class="legend-label">Pending</span>
        </div>
      </div>
    </div>
    <div class="card-body status-card-body">
      <div class="progress-list">
        <div *ngFor="let channel of channels" class="progress-item">
          <div class="channel-name">{{ channel.name }}</div>
          <div class="progress-wrapper">
            <div class="progress-bar-segment incoming" [style.width.%]="channel.incoming">
              <span *ngIf="channel.incoming > 10">{{ channel.incoming }}%</span>
            </div>
            <div class="progress-bar-segment outgoing" [style.width.%]="channel.outgoing">
              <span *ngIf="channel.outgoing > 10">{{ channel.outgoing }}%</span>
            </div>
            <div class="progress-bar-segment pending" [style.width.%]="channel.pending">
              <span *ngIf="channel.pending > 10">{{ channel.pending }}%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
