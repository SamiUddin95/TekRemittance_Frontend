<div class="dashboard-container">
  <app-page-title title="TEK-REMITTANCE DASHBOARD"></app-page-title>

  <section class="content">
    <div class="dashboard-content">
      <!-- Filter Section -->
      <div class="filter-section">
        <div class="card filter-card">
          <div class="card-body">
            <div class="row g-3 align-items-end">
              <div class="col-md-3">
                <label class="form-label">
                  <ng-icon name="tablerCalendar" size="16"></ng-icon>
                  <span>Date Range</span>
                </label>
                <select class="form-select">
                  <option>Today</option>
                  <option>This Week</option>
                  <option>This Month</option>
                  <option>Last Month</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  <ng-icon name="tablerUser" size="16"></ng-icon>
                  <span>Agent</span>
                </label>
                <select class="form-select">
                  <option>All Agents</option>
                  <option>Agent 1</option>
                  <option>Agent 2</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  <ng-icon name="tablerExchange" size="16"></ng-icon>
                  <span>Channel</span>
                </label>
                <select class="form-select">
                  <option>All Channels</option>
                  <option>IBFT</option>
                  <option>Raast</option>
                  <option>FT</option>
                  <option>RTGS</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  <ng-icon name="tablerListDetails" size="16"></ng-icon>
                  <span>Status</span>
                </label>
                <select class="form-select">
                  <option>All Statuses</option>
                  <option>Success</option>
                  <option>Pending</option>
                  <option>Failed</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Tab Navigation -->
      <div class="tab-navigation">
        <div class="tab-card">
          <ul class="nav nav-tabs custom-tabs">
            <li class="nav-item">
              <a class="nav-link" 
                 [class.active]="selectedTab === 'all'" 
                 (click)="selectTab('all')">
                <ng-icon name="tablerLayoutGrid" size="16"></ng-icon>
                <span>All Transactions</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" 
                 [class.active]="selectedTab === 'incoming'" 
                 (click)="selectTab('incoming')">
                <ng-icon name="tablerArrowDownRight" size="16"></ng-icon>
                <span>Incoming</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" 
                 [class.active]="selectedTab === 'outgoing'" 
                 (click)="selectTab('outgoing')">
                <ng-icon name="tablerArrowUpRight" size="16"></ng-icon>
                <span>Outgoing</span>
              </a>
            </li>
          </ul>
        </div>
      </div>

      <!-- Dashboard Widgets -->
      <div class="widgets-container">
        <app-incoming-outgoing-cards [selectedTab]="selectedTab"></app-incoming-outgoing-cards>
        <app-transaction-status-by-channel></app-transaction-status-by-channel>
        <app-agent-bank-performance></app-agent-bank-performance>
        <app-eprc-overview></app-eprc-overview>
      </div>
    </div>
  </section>
</div>
